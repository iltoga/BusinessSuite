<div
  class="flex h-full w-full items-center justify-center bg-black/70 p-2 sm:p-4"
  style="padding-top: max(env(safe-area-inset-top, 0px), env(titlebar-area-height, 0px), 1rem);"
>
  <div
    class="flex h-full max-h-[100%] w-full max-w-[96vw] flex-col overflow-hidden rounded-lg border border-border bg-card shadow-2xl xl:max-w-[1400px]"
  >
    <div
      class="relative flex shrink-0 flex-wrap items-center justify-between gap-2 border-b border-border bg-card px-3 py-2 pr-12"
    >
      <div class="text-sm font-medium text-foreground">Print Preview</div>
      <div class="flex flex-wrap items-center gap-2">
        @if (showDownloadButton) {
          <z-button
            zType="secondary"
            zSize="sm"
            type="button"
            (click)="download()"
            [zDisabled]="isBusy || !src"
            aria-label="Download Image"
          >
            <z-icon zType="download" />
            Download Image
          </z-button>
        }
        <z-button
          zType="outline"
          zSize="sm"
          type="button"
          (click)="print()"
          [zDisabled]="isBusy || !src"
          aria-label="Print Image"
        >
          <z-icon zType="printer" />
          Print
        </z-button>
      </div>
      <button
        z-button
        zType="secondary"
        zSize="sm"
        class="absolute right-2 top-2 h-8 w-8 rounded-full p-0"
        type="button"
        (click)="close()"
        aria-label="Close image preview"
      >
        <z-icon zType="circle-x" class="h-5 w-5" />
      </button>
    </div>

    <div class="relative min-h-0 flex-1 overflow-hidden bg-muted/15">
      <div *ngIf="isBusy" class="h-full w-full p-6 sm:p-10">
        <div class="mx-auto flex h-full max-w-4xl flex-col space-y-4">
          <z-skeleton class="h-7 w-40" />
          <z-skeleton class="h-4 w-64" />
          <z-skeleton class="h-full min-h-[18rem] w-full rounded-md border border-border" />
        </div>
      </div>

      <div *ngIf="!isBusy && imageUrl" class="image-viewer-container h-full min-h-0 min-w-0 flex items-center justify-center overflow-auto p-4">
        <img
          [src]="imageUrl"
          alt="Document Preview"
          class="max-h-full max-w-full object-contain"
          (load)="onImageLoad()"
          (error)="onImageError()"
        />

        <div
          *ngIf="isLoading && !(loadError || errorMessage)"
          class="absolute inset-0 flex items-center justify-center bg-background/80 p-6"
        >
          <div class="w-full max-w-2xl space-y-3">
            <z-skeleton class="h-6 w-44" />
            <z-skeleton class="h-[55vh] w-full rounded-md border border-border" />
          </div>
        </div>

        <div
          *ngIf="loadError || errorMessage"
          class="absolute inset-0 flex items-center justify-center bg-background/70 p-6"
        >
          <div
            class="rounded-lg border border-destructive/40 bg-destructive/10 p-4 text-sm text-foreground"
          >
            {{ errorMessage || loadError }}
          </div>
        </div>
      </div>

      <div
        *ngIf="!isBusy && !imageUrl && errorMessage"
        class="flex h-full w-full items-center justify-center p-6"
      >
        <div
          class="rounded-lg border border-destructive/40 bg-destructive/10 p-4 text-sm text-foreground"
        >
          {{ errorMessage }}
        </div>
      </div>
    </div>
  </div>
</div>
