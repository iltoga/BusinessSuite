<div class="download-dropdown-wrap">
  <button
    z-dropdown
    [zDropdownMenu]="menu"
    z-button
    [zType]="zType()"
    [zSize]="zSize()"
    [zLoading]="loading()"
    aria-label="Download options"
    type="button"
  >
    <z-icon zType="download" />
  </button>

  @if (progress() !== null) {
    <div class="download-progress-popup">
      <div class="download-progress-label">
        <span>Preparing PDF</span>
        <span>{{ progress() }}%</span>
      </div>
      <div class="download-progress-track">
        <div class="download-progress-bar" [style.width.%]="progress()"></div>
      </div>
    </div>
  }
</div>

<z-dropdown-menu-content #menu>
  <button z-dropdown-menu-item (click)="download('docx')">
    <z-icon zType="file-text" class="mr-1" />
    Download DOCX
  </button>
  <button z-dropdown-menu-item (click)="download('pdf')">
    <z-icon zType="file-code" class="mr-1" />
    Download PDF
  </button>
  <button z-dropdown-menu-item (click)="openPrintPreview()">
    <z-icon zType="eye" class="mr-1" />
    <span><span class="font-semibold">P</span>rint Preview</span>
  </button>
</z-dropdown-menu-content>

@if (printPreviewOpen()) {
  @defer {
    <app-pdf-viewer-host
      [src]="printPreviewBlob()"
      [isBusy]="printPreviewLoading()"
      [errorMessage]="printPreviewError()"
      [showDownloadButton]="true"
      [downloadFileName]="printPreviewFilename()"
      (downloadRequested)="downloadPreviewPdf()"
      (closed)="closePrintPreview()"
    />
  } @placeholder {
    <div class="flex items-center justify-center p-8 text-muted-foreground">Loading viewer…</div>
  }
}
