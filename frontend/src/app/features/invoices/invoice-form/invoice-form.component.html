<div class="flex flex-col gap-6">
  <div class="flex items-center justify-between">
    <h1 class="text-3xl font-bold tracking-tight">
      {{ isEditMode() ? 'Edit Invoice' : 'New Invoice' }}
    </h1>
    <z-button zType="ghost" zSize="sm" (click)="goBack()">Back to list</z-button>
  </div>

  <form [formGroup]="form" class="space-y-6">
    <app-form-error-summary [form]="form" [labels]="formErrorLabels" />

    <z-card class="p-6">
      <div class="grid gap-4 md:grid-cols-2">
        <div class="flex flex-col gap-2">
          <app-customer-select
            formControlName="customer"
            [zStatus]="
              form.get('customer')?.invalid && form.get('customer')?.touched ? 'error' : undefined
            "
          />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium">Invoice No</label>
          <input
            z-input
            type="number"
            formControlName="invoiceNo"
            [zStatus]="
              form.get('invoiceNo')?.invalid && form.get('invoiceNo')?.touched ? 'error' : undefined
            "
          />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium">Invoice Date</label>
          <z-date-input formControlName="invoiceDate" />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium">Due Date (Payment)</label>
          <z-date-input formControlName="dueDate" />
        </div>
        <div class="md:col-span-2 flex flex-col gap-2">
          <label class="text-sm font-medium">Notes</label>
          <textarea
            z-input
            rows="3"
            formControlName="notes"
            placeholder="Internal notes..."
          ></textarea>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" formControlName="sent" class="h-4 w-4 rounded border" />
          <label class="text-sm">Sent to customer</label>
        </div>
      </div>
    </z-card>

    <app-invoice-line-items-section
      [form]="form"
      [invoiceApplications]="invoiceApplications"
      [billableProductOptions]="billableProductOptions()"
      [customerSelected]="!!form.get('customer')?.value"
      [totalLabel]="formatCurrency(totalAmount())"
      [isLineLocked]="isLineLocked.bind(this)"
      [toComboboxValue]="toComboboxValue.bind(this)"
      [availablePendingApplicationOptionsForLine]="availablePendingApplicationOptionsForLine.bind(this)"
      [selectedProductPendingCount]="selectedProductPendingCount.bind(this)"
      (addLineItem)="addLineItem()"
      (removeLineItem)="removeLineItem($event)"
      (lineProductChange)="onLineProductComboboxChange($event.group, $event.value)"
      (lineCustomerApplicationChange)="onLineCustomerApplicationComboboxChange($event.group, $event.value)"
    />

    <div class="flex items-center gap-3">
      <z-button zType="default" (click)="save()" [zDisabled]="isSaving()">
        {{ isEditMode() ? 'Update Invoice' : 'Create Invoice' }}
      </z-button>
      <button type="button" z-button zType="ghost" (click)="goBack()">Cancel</button>
    </div>
  </form>
</div>
