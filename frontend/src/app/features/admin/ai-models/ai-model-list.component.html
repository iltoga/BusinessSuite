<div class="p-4 space-y-4">
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-semibold">AI Models</h1>
    <button z-button variant="default" (click)="createNew()">New model</button>
  </div>

  <app-search-toolbar
    [query]="query()"
    (queryChange)="onQueryChange($event)"
    [placeholder]="'Search model name, id, provider...'"
  />

  <table class="w-full text-sm border-collapse">
    <thead>
      <tr>
        <th class="text-left p-2 border-b">Provider</th>
        <th class="text-left p-2 border-b">Name</th>
        <th class="text-left p-2 border-b">Model ID</th>
        <th class="text-left p-2 border-b">Description</th>
        <th class="text-left p-2 border-b">Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (item of items(); track item.id) {
      <tr>
        <td class="p-2 border-b">{{ item.provider }}</td>
        <td class="p-2 border-b">{{ item.name }}</td>
        <td class="p-2 border-b">{{ item.model_id }}</td>
        <td class="p-2 border-b">{{ item.description }}</td>
        <td class="p-2 border-b">
          <button z-button variant="outline" size="sm" (click)="edit(item)">Edit</button>
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
