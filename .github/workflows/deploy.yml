name: Deploy BusinessSuite to VPS using SSH and GitHub Actions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-businesssuite
      cancel-in-progress: true
    env:
      DOCKER_BUILDKIT: 1

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e
            REPO_DIR="${{ secrets.REPO_DIR }}"

            echo "🚀  Starting deployment …"
            echo "📁  Repository directory: $REPO_DIR"

            if [ ! -d "$REPO_DIR" ]; then
              echo "❌  Repository directory does not exist, aborting."
              exit 1
            fi

            cd "$REPO_DIR"
            echo "📂  Working directory: $(pwd)"

            FRONTEND_RECLAIM_THRESHOLD_KB=6291456
            FRONTEND_MIN_SAFE_BUILD_KB=4194304

            # ── EARLY DISK CLEANUP — free space before git fetch ──
            echo "🧹  Pre-deploy disk cleanup …"
            DISK_AVAIL_KB=$(df --output=avail "$REPO_DIR" 2>/dev/null | tail -1 | tr -d ' ' || echo 999999)
            echo "📊  Disk available: ${DISK_AVAIL_KB} KB"
            # If less than 500 MB free, aggressively reclaim space
            if [ "$DISK_AVAIL_KB" -lt 512000 ] 2>/dev/null; then
              echo "⚠️  Low disk space (${DISK_AVAIL_KB} KB) — running safe Docker cleanup …"
              docker container prune -f 2>/dev/null || true
              docker image prune -f 2>/dev/null || true
              docker builder prune -f --keep-storage=2gb 2>/dev/null \
                || docker builder prune -f 2>/dev/null \
                || true
              # Clean old Docker logs (can grow huge on small VPS)
              find /var/lib/docker/containers/ -name '*.log' -size +10M -exec truncate -s 0 {} \; 2>/dev/null || true
              # Clean git gc
              git gc --aggressive --prune=now 2>/dev/null || true
              DISK_AFTER=$(df --output=avail "$REPO_DIR" 2>/dev/null | tail -1 | tr -d ' ' || echo unknown)
              echo "📊  Disk after cleanup: ${DISK_AFTER} KB"
            else
              # Always prune dangling images and stopped containers (lightweight)
              docker container prune -f 2>/dev/null || true
              docker image prune -f 2>/dev/null || true
            fi

            echo "🔗  Ensuring correct Git remote …"
            git remote set-url origin git@github.com:iltoga/BusinessSuite.git

            OLD_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo none)
            echo "📊  Current commit: $OLD_COMMIT"

            echo "📥  Fetching latest changes …"
            git fetch origin main

            echo "🔄  Switching to main branch …"
            git checkout main

            echo "🧹  Resetting local state …"
            # Use FETCH_HEAD — git fetch origin main doesn't always update origin/main tracking ref
            git reset --hard FETCH_HEAD

            # Safely clean only untracked files that won't interfere with operations
            echo "🧹  Cleaning safe untracked files..."
            git clean -f || echo "⚠️  Some files couldn't be cleaned, continuing..."

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "📊  New commit: $NEW_COMMIT"

            if [ "$OLD_COMMIT" = "$NEW_COMMIT" ]; then
              echo "ℹ️  No new commits — skipping deploy."
              exit 0
            fi

            echo "🔍  Detecting what changed …"
            BACKEND_CHANGED=false
            FRONTEND_CHANGED=false
            if [ "$OLD_COMMIT" != none ]; then
              CHANGED_FILES=$(git diff --name-only "$OLD_COMMIT" "$NEW_COMMIT")
              if echo "$CHANGED_FILES" | grep -qE '^(backend/pyproject\.toml|backend/uv\.lock|backend/Dockerfile)'; then
                BACKEND_CHANGED=true
                echo "📦  Backend deps/Dockerfile changed — backend rebuild needed."
              fi
              if echo "$CHANGED_FILES" | grep -qE '^(frontend/|Dockerfile\.frontend)'; then
                FRONTEND_CHANGED=true
                echo "📦  Frontend changed — frontend rebuild needed."
              fi
              # If compose file itself changed, rebuild both
              if echo "$CHANGED_FILES" | grep -qE '^docker-compose\.yml$'; then
                BACKEND_CHANGED=true
                FRONTEND_CHANGED=true
                echo "📦  docker-compose.yml changed — full rebuild needed."
              fi
            else
              BACKEND_CHANGED=true
              FRONTEND_CHANGED=true
            fi

            echo "⚙️  Exporting environment variables from .env …"
            if [ -f .env ]; then
              set -a
              source .env
              set +a
              echo "✅  .env variables loaded."
            else
              echo "❌  .env not found, aborting."
              exit 1
            fi

            export GIT_COMMIT_SHA="$NEW_COMMIT"
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1

            if [ "$FRONTEND_CHANGED" = true ]; then
              DISK_BEFORE_FRONTEND_BUILD=$(df --output=avail "$REPO_DIR" 2>/dev/null | tail -1 | tr -d ' ' || echo 999999)
              echo "📊  Disk available before frontend build: ${DISK_BEFORE_FRONTEND_BUILD} KB"
              if [ "$DISK_BEFORE_FRONTEND_BUILD" -lt "$FRONTEND_RECLAIM_THRESHOLD_KB" ] 2>/dev/null; then
                echo "⚠️  Frontend rebuild needs space and only ${DISK_BEFORE_FRONTEND_BUILD} KB is free — reclaiming from this stack only …"
                docker compose stop bs-frontend 2>/dev/null || true
                docker compose rm -f bs-frontend 2>/dev/null || true
                docker image rm bs-frontend:web 2>/dev/null || true
                docker builder prune -af --keep-storage=512mb 2>/dev/null \
                  || docker builder prune -af 2>/dev/null \
                  || true
                DISK_AFTER_FRONTEND_RECLAIM=$(df --output=avail "$REPO_DIR" 2>/dev/null | tail -1 | tr -d ' ' || echo 0)
                echo "📊  Disk after frontend reclaim: ${DISK_AFTER_FRONTEND_RECLAIM} KB"
                if [ "$DISK_AFTER_FRONTEND_RECLAIM" -lt "$FRONTEND_MIN_SAFE_BUILD_KB" ] 2>/dev/null; then
                  echo "❌  Only ${DISK_AFTER_FRONTEND_RECLAIM} KB free after frontend reclaim; need at least ${FRONTEND_MIN_SAFE_BUILD_KB} KB before rebuilding bs-frontend. Aborting to avoid filling the VPS disk."
                  exit 1
                fi
              fi
            fi

            # ── BUILD IMAGES WHILE OLD CONTAINERS STILL RUN ──
            echo "🏗️  Building images (old containers still serving traffic) …"
            BUILD_TARGETS=""
            if [ "$BACKEND_CHANGED" = true ]; then
              BUILD_TARGETS="$BUILD_TARGETS bs-core"
            fi
            if [ "$FRONTEND_CHANGED" = true ]; then
              BUILD_TARGETS="$BUILD_TARGETS bs-frontend"
            fi
            if [ -n "$BUILD_TARGETS" ]; then
              if [ "$BACKEND_CHANGED" = true ]; then
                docker compose build bs-core
              fi
              if [ "$FRONTEND_CHANGED" = true ]; then
                docker compose build \
                  --build-arg NODE_OPTIONS=--max-old-space-size=1536 \
                  --build-arg NG_BUILD_MAX_WORKERS=1 \
                  bs-frontend
              fi
            else
              echo "ℹ️  No image rebuilds needed — using cached images."
            fi

            # ── QUICK SWAP: stop app containers, keep db + redis running ──
            APP_SERVICES="bs-core bs-worker bs-scheduler bs-frontend bs-alloy"

            echo "🐳  Stopping application containers (db + redis stay running) …"
            docker compose stop $APP_SERVICES 2>/dev/null || true
            docker compose rm -f $APP_SERVICES 2>/dev/null || true

            echo "📦  Ensuring db + redis are running and healthy …"
            docker compose up -d db redis
            # Wait for infrastructure to be healthy before starting app containers
            INFRA_WAIT=0
            INFRA_MAX_WAIT=60
            until docker compose exec -T db pg_isready -U "${DB_USER}" -d "${DB_NAME}" >/dev/null 2>&1; do
              INFRA_WAIT=$((INFRA_WAIT + 3))
              if [ "$INFRA_WAIT" -ge "$INFRA_MAX_WAIT" ]; then
                echo "❌  db not healthy after ${INFRA_MAX_WAIT}s — aborting."
                exit 1
              fi
              echo "⏳  Waiting for db to be ready (${INFRA_WAIT}s/${INFRA_MAX_WAIT}s) …"
              sleep 3
            done
            echo "✅  db is healthy."

            echo "🚀  Starting application containers …"
            docker compose up -d $APP_SERVICES

            # Optionally run initial data seeding if explicitly requested via .env (INITIALIZE_DB=true)
            if [ "${INITIALIZE_DB:-false}" = "true" ]; then
              echo "🧪  INITIALIZE_DB=true — running one-off seeding script inside bs-core container via exec with retries"

              ATTEMPTS=0
              MAX_ATTEMPTS=6
              SLEEP_SECONDS=10
              until docker compose exec -T bs-core /bin/bash /usr/src/app/scripts/init_db.sh; do
                ATTEMPTS=$((ATTEMPTS + 1))
                if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
                  echo "❌ Failed to run init script after $ATTEMPTS attempts. Aborting."
                  exit 1
                fi
                echo "⚠️ bs-core not ready for exec (attempt $ATTEMPTS/$MAX_ATTEMPTS), retrying in ${SLEEP_SECONDS}s..."
                sleep "$SLEEP_SECONDS"
              done

              echo "✅ INIT script completed."
            else
              echo "ℹ️  INITIALIZE_DB != true — skipping one-off seeding tasks"
            fi

            # Optionally run cloud-storage migration tasks if explicitly requested via .env (MIGRATE_STORAGE_ASSETS=true)
            if [ "${MIGRATE_STORAGE_ASSETS:-false}" = "true" ]; then
              echo "☁️  MIGRATE_STORAGE_ASSETS=true — running migrate_storage_assets inside bs-core container via exec with retries"

              ATTEMPTS=0
              MAX_ATTEMPTS=6
              SLEEP_SECONDS=10
              until docker compose exec -T bs-core /bin/bash -lc 'PYTHON_BIN="python"; if [ -x "/opt/venv/bin/python" ]; then PYTHON_BIN="/opt/venv/bin/python"; fi; $PYTHON_BIN manage.py migrate_storage_assets'; do
                ATTEMPTS=$((ATTEMPTS + 1))
                if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
                  echo "❌ Failed to run migrate_storage_assets after $ATTEMPTS attempts. Aborting."
                  exit 1
                fi
                echo "⚠️ bs-core not ready for exec (attempt $ATTEMPTS/$MAX_ATTEMPTS), retrying in ${SLEEP_SECONDS}s..."
                sleep "$SLEEP_SECONDS"
              done

              echo "✅ Storage migration command completed."
            else
              echo "ℹ️  MIGRATE_STORAGE_ASSETS != true — skipping storage migration tasks"
            fi

            # Post-deploy cleanup: dangling images, stopped containers, and build cache
            echo "🧹  Post-deploy cleanup …"
            docker image prune -f 2>/dev/null || true
            docker container prune -f 2>/dev/null || true
            docker builder prune -f --keep-storage=2gb 2>/dev/null \
              || docker builder prune -f --all 2>/dev/null \
              || echo "⚠️  builder prune not supported, skipping"

            DISK_FINAL=$(df -h "$REPO_DIR" 2>/dev/null | tail -1 || echo "unknown")
            echo "📊  Final disk status: $DISK_FINAL"
