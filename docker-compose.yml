services:
  db:
    container_name: postgres-srv
    hostname: db
    image: postgres:18
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "tcp_keepalives_idle=300"
      - "-c"
      - "tcp_keepalives_interval=60"
      - "-c"
      - "tcp_keepalives_count=5"
      - "-c"
      - "idle_in_transaction_session_timeout=300000"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    networks:
      dockernet:
        ipv4_address: 192.168.2.50
        aliases:
          - db
          - postgres-srv
    volumes:
      - type: bind
        source: ${DB_PATH}
        target: /var/lib/postgresql
        bind:
          propagation: rslave
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 2s
    mem_limit: 384m
    cpus: "1.0"

  # pgadmin:
  #   container_name: pgadmin
  #   image: dpage/pgadmin4:7
  #   depends_on:
  #     - db
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS}
  #   networks:
  #     - dockernet

  redis:
    container_name: bs-redis
    hostname: bs-redis
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--save"
      - "300"
      - "10"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "200mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--tcp-keepalive"
      - "60"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    volumes:
      - redis_data:/data
    networks:
      dockernet:
        ipv4_address: 192.168.2.62
        aliases:
          - bs-redis
          - redis
    # ports:
    #   - "6379:6379"
    mem_limit: 256m
    cpus: "0.5"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  bs-core:
    container_name: bs-core
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    image: bs-app:web
    build:
      context: ./backend/
      dockerfile: Dockerfile
      target: web
    networks:
      dockernet:
        ipv4_address: 192.168.2.60
    environment:
      DB_HOST: ${DOCKER_DB_HOST:-db}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-bs-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://bs-redis:6379/1}
      DRAMATIQ_REDIS_DB: ${DRAMATIQ_REDIS_DB:-0}
      DRAMATIQ_REDIS_URL: ${DOCKER_DRAMATIQ_REDIS_URL:-redis://bs-redis:6379/0}
      COMPONENT: backend
      MEDIA_ROOT: /media
      MEDIA_URL: /media/
      BACKUPS_ROOT: /backups
      OTEL_SERVICE_NAME: bs-core
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER_BACKEND:-none}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://bs-alloy:4318/v1/traces
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=production,service.namespace=revisbali"
      LOCAL_MEDIA_ENCRYPTION_ENABLED: ${LOCAL_MEDIA_ENCRYPTION_ENABLED:-false}
      LOCAL_MEDIA_ENCRYPTION_KEY: ${LOCAL_MEDIA_ENCRYPTION_KEY:-}
      LOCAL_SYNC_ENABLED: ${LOCAL_SYNC_ENABLED:-false}
      LOCAL_SYNC_NODE_ID: ${LOCAL_SYNC_NODE_ID:-vps-primary}
      LOCAL_SYNC_REMOTE_BASE_URL: ${LOCAL_SYNC_REMOTE_BASE_URL:-}
      LOCAL_SYNC_REMOTE_TOKEN: ${LOCAL_SYNC_REMOTE_TOKEN:-}
      LOCAL_SYNC_PUSH_LIMIT: ${LOCAL_SYNC_PUSH_LIMIT:-200}
      LOCAL_SYNC_PULL_LIMIT: ${LOCAL_SYNC_PULL_LIMIT:-200}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      GUNICORN_MAX_REQUESTS: ${GUNICORN_MAX_REQUESTS:-1200}
      GUNICORN_MAX_REQUESTS_JITTER: ${GUNICORN_MAX_REQUESTS_JITTER:-50}
    volumes:
      - ./.env:/usr/src/app/.env:ro
      - type: bind
        source: ./backend
        target: /usr/src/app
        bind:
          propagation: rslave
      - type: bind
        source: ${DATA_PATH}/media
        target: /media
      - type: bind
        source: ${DATA_PATH}/db
        target: /db
      - type: bind
        source: ${DATA_PATH}/logs
        target: /logs
      - type: bind
        source: ${DATA_PATH}/staticfiles
        target: /staticfiles
      - type: bind
        source: ~/revisbali/crm/backups
        target: /backups
      - le-certs:/etc/letsencrypt
    restart: unless-stopped
    mem_limit: 800m
    cpus: "1.0"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - |
          import urllib.request,urllib.error,sys
          try:
            req=urllib.request.Request('http://127.0.0.1:8000/api/health/', headers={'Host':'bs-core'})
            urllib.request.urlopen(req, timeout=5)
          except urllib.error.HTTPError as e:
            sys.exit(0 if e.code==503 else 1)
          except Exception:
            sys.exit(1)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
      start_interval: 5s

  bs-worker:
    container_name: bs-worker
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      bs-core:
        condition: service_healthy
    image: bs-app:web
    networks:
      dockernet:
        ipv4_address: 192.168.2.63
    environment:
      DB_HOST: ${DOCKER_DB_HOST:-db}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-bs-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://bs-redis:6379/1}
      DRAMATIQ_REDIS_DB: ${DRAMATIQ_REDIS_DB:-0}
      DRAMATIQ_REDIS_URL: ${DOCKER_DRAMATIQ_REDIS_URL:-redis://bs-redis:6379/0}
      DRAMATIQ_HIGH_THREADS: ${DRAMATIQ_HIGH_THREADS:-2}
      DRAMATIQ_LOW_THREADS: ${DRAMATIQ_LOW_THREADS:-1}
      DRAMATIQ_HIGH_PROCESSES: ${DRAMATIQ_HIGH_PROCESSES:-1}
      DRAMATIQ_LOW_PROCESSES: ${DRAMATIQ_LOW_PROCESSES:-1}
      DRAMATIQ_DOC_PROCESSES: ${DRAMATIQ_DOC_PROCESSES:-1}
      DRAMATIQ_DOC_THREADS: ${DRAMATIQ_DOC_THREADS:-1}
      COMPONENT: task_worker
      MEDIA_ROOT: /media
      MEDIA_URL: /media/
      BACKUPS_ROOT: /backups
      OTEL_SERVICE_NAME: bs-worker
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER_WORKER:-none}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://bs-alloy:4318/v1/traces
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=production,service.namespace=revisbali"
      LOCAL_MEDIA_ENCRYPTION_ENABLED: ${LOCAL_MEDIA_ENCRYPTION_ENABLED:-false}
      LOCAL_MEDIA_ENCRYPTION_KEY: ${LOCAL_MEDIA_ENCRYPTION_KEY:-}
      LOCAL_SYNC_ENABLED: ${LOCAL_SYNC_ENABLED:-false}
      LOCAL_SYNC_NODE_ID: ${LOCAL_SYNC_NODE_ID:-vps-worker}
      LOCAL_SYNC_REMOTE_BASE_URL: ${LOCAL_SYNC_REMOTE_BASE_URL:-}
      LOCAL_SYNC_REMOTE_TOKEN: ${LOCAL_SYNC_REMOTE_TOKEN:-}
      LOCAL_SYNC_PUSH_LIMIT: ${LOCAL_SYNC_PUSH_LIMIT:-200}
      LOCAL_SYNC_PULL_LIMIT: ${LOCAL_SYNC_PULL_LIMIT:-200}
    volumes:
      - ./.env:/usr/src/app/.env:ro
      - type: bind
        source: ./backend
        target: /usr/src/app
      - type: bind
        source: ${DATA_PATH}/media
        target: /media
      - type: bind
        source: ${DATA_PATH}/db
        target: /db
      - type: bind
        source: ${DATA_PATH}/logs
        target: /logs
      - type: bind
        source: ${DATA_PATH}/staticfiles
        target: /staticfiles
      - type: bind
        source: ~/revisbali/crm/backups
        target: /backups
      - le-certs:/etc/letsencrypt
    restart: unless-stopped
    init: true
    mem_limit: 1024m
    cpus: "1.5"
    healthcheck:
      test: ["CMD", "sh", "/usr/src/app/scripts/healthcheck_worker.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
      start_interval: 5s
    command:
      - /bin/sh
      - -lc
      - chmod +x /usr/src/app/scripts/*.sh && exec /bin/sh /usr/src/app/scripts/run_dramatiq_workers.sh

  bs-scheduler:
    container_name: bs-scheduler
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      bs-core:
        condition: service_healthy
    image: bs-app:web
    networks:
      dockernet:
        ipv4_address: 192.168.2.64
    environment:
      DB_HOST: ${DOCKER_DB_HOST:-db}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-bs-redis}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://bs-redis:6379/1}
      DRAMATIQ_REDIS_DB: ${DRAMATIQ_REDIS_DB:-0}
      DRAMATIQ_REDIS_URL: ${DOCKER_DRAMATIQ_REDIS_URL:-redis://bs-redis:6379/0}
      COMPONENT: scheduler
      MEDIA_ROOT: /media
      MEDIA_URL: /media/
      BACKUPS_ROOT: /backups
      OTEL_SERVICE_NAME: bs-scheduler
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER_WORKER:-none}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://bs-alloy:4318/v1/traces
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=production,service.namespace=revisbali"
      LOCAL_MEDIA_ENCRYPTION_ENABLED: ${LOCAL_MEDIA_ENCRYPTION_ENABLED:-false}
      LOCAL_MEDIA_ENCRYPTION_KEY: ${LOCAL_MEDIA_ENCRYPTION_KEY:-}
    volumes:
      - ./.env:/usr/src/app/.env:ro
      - type: bind
        source: ./backend
        target: /usr/src/app
      - type: bind
        source: ${DATA_PATH}/media
        target: /media
      - type: bind
        source: ${DATA_PATH}/db
        target: /db
      - type: bind
        source: ${DATA_PATH}/logs
        target: /logs
      - type: bind
        source: ${DATA_PATH}/staticfiles
        target: /staticfiles
      - type: bind
        source: ~/revisbali/crm/backups
        target: /backups
      - le-certs:/etc/letsencrypt
    restart: unless-stopped
    init: true
    mem_limit: 320m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "sh", "/usr/src/app/scripts/healthcheck_scheduler.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s
    command:
      - /bin/sh
      - -lc
      - chmod +x /usr/src/app/scripts/*.sh && /opt/venv/bin/python manage.py run_dramatiq_scheduler

  bs-frontend:
    container_name: bs-frontend
    depends_on:
      bs-core:
        condition: service_healthy
      bs-alloy:
        condition: service_started
    image: bs-frontend:web
    build:
      context: ./
      dockerfile: Dockerfile.frontend
      args:
        NODE_OPTIONS: --max-old-space-size=2048
        NG_BUILD_MAX_WORKERS: 1
    networks:
      dockernet:
        ipv4_address: 192.168.2.61
    env_file:
      - ./.env
    environment:
      PORT: 4000
      BACKEND_URL: http://bs-core:8000
      CSP_ENABLED: ${CSP_ENABLED}
      CSP_MODE: ${CSP_MODE}
      FE_LOG_FILE_PATH: /logs/frontend.log
      OTEL_SERVICE_NAME: bs-frontend
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER_FRONTEND:-none}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_EXPORTER_OTLP_TRACES_HEADERS: ${OTEL_EXPORTER_OTLP_TRACES_HEADERS:-}
      OTEL_EXPORTER_OTLP_TIMEOUT: ${OTEL_EXPORTER_OTLP_TIMEOUT:-10000}
      OTEL_EXPORTER_OTLP_TRACES_TIMEOUT: ${OTEL_EXPORTER_OTLP_TRACES_TIMEOUT:-}
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=production,service.namespace=revisbali"
    volumes:
      - type: bind
        source: ${DATA_PATH}/logs
        target: /logs
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.5"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:4000/healthz || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 3s

  bs-alloy:
    container_name: bs-alloy
    image: grafana/alloy:latest
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./grafana/alloy/config-prod.alloy:/etc/alloy/config.alloy:ro
      - type: bind
        source: ${DATA_PATH}/logs
        target: /host_logs
        read_only: true
      - alloy-data:/var/lib/alloy/data
    environment:
      # --- Low-Resource Tuning ---
      GOMEMLIMIT: 250MiB # Soft limit: triggers GC before hitting 250MB
      GOGC: 50 # More aggressive garbage collection
      GOMAXPROCS: 1 # Limit to 1 CPU core to prevent thrashing
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    # ports:
    #   - "12345:12345"
    #   - "4318:4318"
    networks:
      - dockernet
    mem_limit: 128m
    cpus: "0.3"
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 128M

networks:
  dockernet:
    external: true

volumes:
  le-certs:
    name: le-certs
    external: true
  alloy-data:
    name: alloy-data
  redis_data:
